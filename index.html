<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Corne Keymap</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:      #0d0d0f;
  --bg2:     #131316;
  --bg3:     #1c1c22;
  --border:  rgba(255,255,255,0.06);
  --border2: rgba(255,255,255,0.13);
  --text:    #e2dfd8;
  --muted:   #65626e;
  --accent:  #c4b3ff;
  --accent2: #7b6df0;
  --key-size: 70px;
  --key-pad:  5px;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 52px 32px 80px;
  overflow-x: hidden;
}

body::before {
  content: '';
  position: fixed; inset: 0;
  background-image:
    linear-gradient(rgba(255,255,255,0.016) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.016) 1px, transparent 1px);
  background-size: 40px 40px;
  pointer-events: none; z-index: 0;
}

.page {
  position: relative; z-index: 1;
  width: 100%; max-width: 1000px;
}

/* ── Header ── */
header {
  display: flex; align-items: flex-end; justify-content: space-between;
  margin-bottom: 44px; padding-bottom: 22px;
  border-bottom: 1px solid var(--border);
}
.logo-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px; font-weight: 500;
  letter-spacing: .2em; text-transform: uppercase; color: var(--accent2);
  margin-bottom: 6px;
}
.logo-title {
  font-family: 'JetBrains Mono', monospace;
  font-size: 34px; font-weight: 600;
  letter-spacing: -.03em; color: var(--text);
}
.logo-sub { font-size: 15px; color: var(--muted); font-weight: 300; margin-top: 4px; }
.header-meta {
  text-align: right; font-family: 'JetBrains Mono', monospace;
  font-size: 13px; color: var(--muted); line-height: 2;
}
.header-meta span { color: var(--accent); }

/* ── Layer tabs ── */
.layer-nav { display: flex; gap: 4px; margin-bottom: 32px; }
.layer-tab {
  padding: 7px 20px; border-radius: 6px;
  border: 1px solid var(--border);
  background: transparent; color: var(--muted);
  font-family: 'JetBrains Mono', monospace;
  font-size: 13px; font-weight: 500; letter-spacing: .06em;
  cursor: pointer; transition: all .15s;
}
.layer-tab:hover { color: var(--text); border-color: var(--border2); background: var(--bg3); }
.layer-tab.active { background: var(--bg3); border-color: var(--accent2); color: var(--accent); }

/* ── Keyboard canvas ── */
.kb-canvas {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 36px 40px 48px;
  position: relative;
  overflow: hidden;
}
.kb-canvas::before {
  content: '';
  position: absolute; inset: 0;
  background: radial-gradient(ellipse at 50% -10%, rgba(123,109,240,.07) 0%, transparent 60%);
  pointer-events: none;
}

/* ── Key layout container ── */
/* The layout uses position:absolute keys inside a relative wrapper */
#kb-layout {
  position: relative;
  /* width/height set by JS from bounding box */
  margin: 0 auto;
}

/* ── Individual keys ── */
/* Each key is position:absolute, placed and rotated by JS inline styles */
.key-placer {
  position: absolute;
}

.key {
  position: absolute; inset: 0;
  border-radius: 8px;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  cursor: pointer;
  transition: border-color .12s, background .12s;
  user-select: none;
  /* Depth: shadow rect behind + face plate inside */
}

/* Key shadow layer (depth effect) */
.key::before {
  content: '';
  position: absolute;
  inset: 0; top: 3px;
  border-radius: 8px;
  background: rgba(0,0,0,0.55);
  z-index: 0;
  translate: 0 0; /* keep it layered behind */
}

/* Key face plate */
.key::after {
  content: '';
  position: absolute;
  inset: 4px; bottom: 6px;
  border-radius: 5px;
  background: rgba(255,255,255,0.04);
  z-index: 1;
}

.key-body {
  position: absolute; inset: 0;
  border-radius: 8px;
  border: 1px solid var(--key-border, rgba(255,255,255,0.09));
  background: var(--key-bg, #1f1f2a);
  z-index: 2;
  transition: border-color .12s;
}

.key-label {
  position: relative; z-index: 3;
  font-family: 'JetBrains Mono', monospace;
  font-size: 13px; font-weight: 500;
  color: var(--key-text, #ccc8be);
  text-align: center;
  line-height: 1.25;
  pointer-events: none;
}
.key-label .sub {
  display: block;
  font-size: 11px; font-weight: 400;
  opacity: .55;
  margin-top: 2px;
}

.key:hover .key-body { border-color: var(--key-border-hover, rgba(255,255,255,0.24)); }
.key:active:not(.empty) .key-body,
.key.pressed .key-body {
  border-color: var(--key-border-hover, rgba(255,255,255,0.35));
  background: color-mix(in srgb, var(--key-bg, #1f1f2a) 70%, white);
  box-shadow: 0 0 12px 2px rgba(196,179,255,0.25);
}
.key:active:not(.empty),
.key.pressed { transform: translateY(2px); }
.key:active:not(.empty) .key-label,
.key.pressed .key-label { color: #fff; }
.key.empty { cursor: default; opacity: .18; }
.key.empty:hover .key-body { border-color: var(--key-border, rgba(255,255,255,0.09)); }

/* Color variants */
.key.c-blue   { --key-bg: #1b2845; --key-border: #3558a0; --key-text: #85aee8; --key-border-hover: #5a88d8; }
.key.c-teal   { --key-bg: #102820; --key-border: #286050; --key-text: #55c89a; --key-border-hover: #40a87a; }
.key.c-amber  { --key-bg: #2a1c00; --key-border: #a86818; --key-text: #e8b040; --key-border-hover: #d09030; }
.key.c-green  { --key-bg: #121e08; --key-border: #386810; --key-text: #78c038; --key-border-hover: #58a020; }
.key.c-coral  { --key-bg: #2e0e08; --key-border: #b83a1c; --key-text: #e87858; --key-border-hover: #d05840; }
.key.c-purple { --key-bg: #180f30; --key-border: #5848c0; --key-text: #a898f0; --key-border-hover: #8878e0; }

/* ── Legend ── */
.legend {
  display: flex; gap: 20px; flex-wrap: wrap;
  margin-top: 28px; padding-top: 22px;
  border-top: 1px solid var(--border);
}
.legend-item {
  display: flex; align-items: center; gap: 7px;
  font-size: 13px; color: var(--muted);
  font-family: 'JetBrains Mono', monospace;
}
.legend-pip {
  width: 12px; height: 12px;
  border-radius: 3px; border: 1px solid;
  flex-shrink: 0;
}

/* ── Combos ── */
.combos {
  margin-top: 28px; padding: 18px 22px;
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: 12px;
}
.combos-title {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px; letter-spacing: .18em;
  text-transform: uppercase; color: var(--muted);
  margin-bottom: 12px;
}
.combo-row { display: flex; align-items: center; gap: 7px; margin-top: 6px; }
.combo-key {
  font-family: 'JetBrains Mono', monospace; font-size: 13px;
  padding: 2px 8px; border-radius: 4px;
  border: 1px solid var(--border2); background: var(--bg3); color: var(--text);
}
.combo-op { color: var(--muted); font-size: 13px; }
.combo-result { color: var(--accent); font-family: 'JetBrains Mono', monospace; font-size: 14px; }

/* ── Tooltip ── */
#tooltip {
  position: fixed;
  background: var(--bg3); border: 1px solid var(--border2);
  border-radius: 9px; padding: 9px 13px;
  font-family: 'JetBrains Mono', monospace; font-size: 13px;
  color: var(--text); pointer-events: none; z-index: 1000;
  display: none; max-width: 260px; line-height: 1.65;
  box-shadow: 0 12px 40px rgba(0,0,0,.55);
}

footer {
  margin-top: 44px; text-align: center;
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px; letter-spacing: .08em; color: var(--muted);
}
</style>
</head>
<body>
<div class="page">
  <header>
    <div>
      <div class="logo-label">ZMK Keymap</div>
      <div class="logo-title">Corne</div>
      <div class="logo-sub">crkbd · 42 keys · 4 layers</div>
    </div>
    <div class="header-meta">
      <div>split <span>3×6</span> + <span>3</span> thumb</div>
      <div>zmk · wireless</div>
    </div>
  </header>

  <div class="layer-nav" id="tabs"></div>

  <div class="kb-canvas">
    <div id="kb-layout"></div>

    <div class="legend">
      <div class="legend-item"><div class="legend-pip" style="background:#1b2845;border-color:#3558a0"></div>mod / hold</div>
      <div class="legend-item"><div class="legend-pip" style="background:#102820;border-color:#286050"></div>layer</div>
      <div class="legend-item"><div class="legend-pip" style="background:#2a1c00;border-color:#a86818"></div>special</div>
      <div class="legend-item"><div class="legend-pip" style="background:#121e08;border-color:#386810"></div>media / fn</div>
      <div class="legend-item"><div class="legend-pip" style="background:#2e0e08;border-color:#b83a1c"></div>mouse / scroll</div>
      <div class="legend-item"><div class="legend-pip" style="background:#180f30;border-color:#5848c0"></div>bluetooth</div>
    </div>
  </div>

  <div class="combos">
    <div class="combos-title">Combos</div>
    <div class="combo-row">
      <span class="combo-key">Tab (pos 0)</span>
      <span class="combo-op">+</span>
      <span class="combo-key">⌘ thumb</span>
      <span class="combo-op">→</span>
      <span class="combo-result">⌘` (switch app windows)</span>
    </div>
    <div class="combo-row">
      <span class="combo-key">L1 thumb</span>
      <span class="combo-op">+</span>
      <span class="combo-key">L2 thumb</span>
      <span class="combo-op">→</span>
      <span class="combo-result">Layer 3 (BT / bootloader)</span>
    </div>
  </div>
  <footer>hover any key for binding details</footer>
</div>
<div id="tooltip"></div>

<script>
// ─── Exact Corne layout from nickcoutsos/keymap-layout-tools/corne-layout.json
// Coordinates in key units. 1u = KEY_SIZE px.
// Rotation: key placed at (x,y), rotated `r` degrees around pivot (rx, ry).
// This exactly matches the keymap-editor rendering pipeline.

const CORNE_LAYOUT = [
  // Row 0
  { x:  0,    y: 0.375 },
  { x:  1,    y: 0.375 },
  { x:  2,    y: 0.125 },
  { x:  3,    y: 0     },
  { x:  4,    y: 0.125 },
  { x:  5,    y: 0.25  },
  { x:  9,    y: 0.25  },
  { x: 10,    y: 0.125 },
  { x: 11,    y: 0     },
  { x: 12,    y: 0.125 },
  { x: 13,    y: 0.375 },
  { x: 14,    y: 0.375 },
  // Row 1
  { x:  0,    y: 1.375 },
  { x:  1,    y: 1.375 },
  { x:  2,    y: 1.125 },
  { x:  3,    y: 1     },
  { x:  4,    y: 1.125 },
  { x:  5,    y: 1.25  },
  { x:  9,    y: 1.25  },
  { x: 10,    y: 1.125 },
  { x: 11,    y: 1     },
  { x: 12,    y: 1.125 },
  { x: 13,    y: 1.375 },
  { x: 14,    y: 1.375 },
  // Row 2
  { x:  0,    y: 2.375 },
  { x:  1,    y: 2.375 },
  { x:  2,    y: 2.125 },
  { x:  3,    y: 2     },
  { x:  4,    y: 2.125 },
  { x:  5,    y: 2.25  },
  { x:  9,    y: 2.25  },
  { x: 10,    y: 2.125 },
  { x: 11,    y: 2     },
  { x: 12,    y: 2.125 },
  { x: 13,    y: 2.375 },
  { x: 14,    y: 2.375 },
  // Thumb row — with rotation pivot (rx, ry) exactly as in the source JSON
  { x:  3.48, y: 3.125, r:  0,  rx: undefined,  ry: undefined       },
  { x:  3.48, y: 3.125, r:  15, rx: 3.98,        ry: 7.895           },
  { x:  3.48, y: 2.625, r:  30, rx: 3.98,        ry: 7.895, h: 1.5  },
  { x: 10.52, y: 2.625, r: -30, rx: 11.02,       ry: 7.895, h: 1.5  },
  { x: 10.52, y: 3.125, r: -15, rx: 11.02,       ry: 7.895           },
  { x: 10.52, y: 3.125, r:  0,  rx: undefined,   ry: undefined       },
];

// ─── Geometry — ported directly from geometry.js ──────────────────────────────
const KEY_SIZE = 70; // px per key unit
const PADDING  = 5;  // px gap inside each key

function getComputedParams(key) {
  const x  = key.x  * KEY_SIZE;
  const y  = key.y  * KEY_SIZE;
  const u  = (key.u || key.w || 1) * KEY_SIZE;
  const h  = (key.h || 1) * KEY_SIZE;
  const rx = (key.x - (key.rx ?? key.x)) * -KEY_SIZE;
  const ry = (key.y - (key.ry ?? key.y)) * -KEY_SIZE;
  const a  = key.r || 0;
  return { x, y, u, h, rx, ry, a };
}

function getKeyStyles(key) {
  const { x, y, u, h, rx, ry, a } = getComputedParams(key);
  const p = PADDING;
  return {
    top:             `${y}px`,
    left:            `${x}px`,
    width:           `${u - p}px`,
    height:          `${h - p}px`,
    transformOrigin: `${rx}px ${ry}px`,
    transform:       `rotate(${a}deg) translate(${p / 2}px, ${p / 2}px)`,
  };
}

// Bounding box — same as geometry.js transformKeyPolygon + bbox
function transformKeyPolygon(key) {
  const { x, y, u, h, rx, ry, a } = getComputedParams(key);
  const points = [
    { x: 0, y: 0 }, { x: u, y: 0 }, { x: u, y: h }, { x: 0, y: h }
  ];
  const rad = Math.PI * a / 180;
  return points.map(p => {
    const px = p.x - rx, py = p.y - ry;
    return {
      x: rx + px * Math.cos(rad) - py * Math.sin(rad) + x,
      y: ry + py * Math.cos(rad) + px * Math.sin(rad) + y,
    };
  });
}

function layoutBoundingBox() {
  let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
  CORNE_LAYOUT.forEach(key => {
    transformKeyPolygon(key).forEach(p => {
      minX = Math.min(minX, p.x); minY = Math.min(minY, p.y);
      maxX = Math.max(maxX, p.x); maxY = Math.max(maxY, p.y);
    });
  });
  return { minX, minY, maxX, maxY };
}

// ─── Layer data ───────────────────────────────────────────────────────────────
const k = (label, hint, color, layer) => ({ label, hint: hint || label, color: color || '', layer });
const _ = () => ({ label: '—', hint: '(none)', color: '', empty: true });

const LAYERS = [
  { name: 'BASE', keys: [
    k('Tab'), k('Q'), k('W'), k('E'), k('R'), k('T'),
    k('Y'), k('U'), k('I'), k('O'), k('P'), k('⌫','Backspace'),
    k('Esc/⌃', 'Esc (tap) · Ctrl (hold)\nWith any modifier → `', 'amber'),
    k('A'), k('S'), k('D'), k('F'), k('G'),
    k('H'), k('J'), k('K'), k('L'), k(';'), k("'"),
    k('Shift','Left Shift','blue'), k('Z'), k('X'), k('C'), k('V'), k('B'),
    k('N'), k('M'), k(','), k('.'), k('/'), k('L1','Layer 1 (hold)','teal', 1),
    k('Alt/Spc','Alt (hold) · Space (tap)','blue'),
    k('⌘','Left GUI (⌘)','blue'),
    k('Hyp/↩','Hyper (hold) · Enter (tap)','blue'),
    k('Space'),
    k('L1/⌘','1 tap → Layer 1\n2 taps → ⌘ (GUI)','teal', 1),
    k('L2/↩','Layer 2 (hold) · Enter (tap)','teal', 2),
  ]},
  { name: 'LAYER 1', keys: [
    k('`','Grave'), k('1'), k('2'), k('3'), k('4'), k('5'),
    k('6'), k('7'), k('8'), k('9'), k('0'), k('–','Minus'),
    k('Ctrl','Left Ctrl','blue'), _(), _(), _(), _(), k('Del','Delete','green'),
    _(), k('[','Left bracket'), k('↑','Up arrow','teal'), k(']','Right bracket'),
    k('CW','Caps Word','amber'), k('=','Equal'),
    k('Shift','Left Shift','blue'), _(), _(), _(), _(), _(),
    _(), k('←','Left arrow','teal'), k('↓','Down arrow','teal'),
    k('→','Right arrow','teal'), k('\\','Backslash'), k('Shift','Left Shift','blue'),
    k('Alt/Spc','Alt (hold) · Space (tap)','blue'),
    k('⌘','Left GUI (⌘)','blue'),
    k('Hyp/↩','Hyper (hold) · Enter (tap)','blue'),
    k('Space'), _(), k('↩','Enter'),
  ]},
  { name: 'LAYER 2', keys: [
    k('F12','F12','green'), k('F1','F1','green'), k('F2','F2','green'),
    k('F3','F3','green'), k('F4','F4','green'), k('F5','F5','green'),
    k('F6','F6','green'), k('F7','F7','green'), k('F8','F8','green'),
    k('F9','F9','green'), k('F10','F10','green'), k('F11','F11','green'),
    _(), _(),
    k('⇠Scrl','Scroll Left','coral'), k('↑Mv','Mouse Up','coral'),
    k('⇢Scrl','Scroll Right','coral'), k('⇡Scrl','Scroll Up','coral'),
    k('⏮','Prev track','green'), k('⏯','Play/Pause','green'),
    k('⏭','Next track','green'), k('Vol–','Vol Down','green'),
    k('Mute','Mute','green'), k('Vol+','Vol Up','green'),
    k('Shift','Left Shift','blue'), _(),
    k('←Mv','Mouse Left','coral'), k('↓Mv','Mouse Down','coral'),
    k('→Mv','Mouse Right','coral'), k('⇣Scrl','Scroll Down','coral'),
    _(), k('LClk','Left Click','coral'),
    k('MClk','Mid Click','coral'), k('RClk','Right Click','coral'),
    _(), k('Shift','Left Shift','blue'),
    k('Alt/Spc','Alt (hold) · Space (tap)','blue'),
    k('⌘','Left GUI (⌘)','blue'),
    k('Hyp/↩','Hyper (hold) · Enter (tap)','blue'),
    k('Space'), k('⌘','Left GUI (⌘)','blue'), _(),
  ]},
  { name: 'LAYER 3', keys: [
    k('BT clr all','Clear ALL BT bonds','coral'),_(),_(),_(),_(),_(), _(),_(),_(),_(),_(),_(),
    k('BTclr','Clear BT bonds','coral'),
    k('BT 0','BT profile 0','purple'), k('BT 1','BT profile 1','purple'),
    k('BT 2','BT profile 2','purple'), k('BT 3','BT profile 3','purple'),
    k('BT 4','BT profile 4','purple'),
    _(),_(),_(),_(),_(),_(),
    _(),_(),_(),_(),_(),_(), _(),_(),_(),_(),_(),_(),
    _(), _(), k('Boot','Enter bootloader','coral'),
    k('Boot','Enter bootloader','coral'), _(), _(),
  ]},
];

// ─── Render ───────────────────────────────────────────────────────────────────
const container = document.getElementById('kb-layout');
const tip       = document.getElementById('tooltip');
let   current   = 0;
let   holdLayer = null;

document.addEventListener('mouseup', () => {
  if (holdLayer != null) {
    holdLayer = null;
    current = 0;
    buildTabs();
    renderLayer(0);
  }
});

// Compute bounding box once — same for all layers
const bbox = layoutBoundingBox();
const layoutW = bbox.maxX - bbox.minX;
const layoutH = bbox.maxY - bbox.minY;

// Scale to fit the canvas nicely
const SCALE = Math.min(1, 900 / layoutW);

container.style.width  = `${layoutW * SCALE}px`;
container.style.height = `${layoutH * SCALE}px`;
container.style.transform = `scale(${SCALE})`;
container.style.transformOrigin = '0 0';

// Offset so minX/minY land at 0,0
const OX = -bbox.minX;
const OY = -bbox.minY;

function renderLayer(idx) {
  container.innerHTML = '';
  const layer = LAYERS[idx];

  CORNE_LAYOUT.forEach((keyPos, i) => {
    const data = layer.keys[i];
    const styles = getKeyStyles(keyPos);

    // Shift by origin offset so everything is non-negative
    const topVal  = parseFloat(styles.top)  + OY;
    const leftVal = parseFloat(styles.left) + OX;

    // Placer div — positioned and rotated exactly like KeyPlacer.jsx
    const placer = document.createElement('div');
    placer.className = 'key-placer';
    placer.style.top             = `${topVal}px`;
    placer.style.left            = `${leftVal}px`;
    placer.style.width           = styles.width;
    placer.style.height          = styles.height;
    placer.style.transformOrigin = styles.transformOrigin;
    placer.style.transform       = styles.transform;

    // Key div
    const key = document.createElement('div');
    key.className = 'key' + (data.empty ? ' empty' : '') + (data.color ? ' c-' + data.color : '');
    key.dataset.idx = i;

    const body = document.createElement('div');
    body.className = 'key-body';
    key.appendChild(body);

    if (!data.empty) {
      const label = document.createElement('div');
      label.className = 'key-label';
      const parts = data.label.split('/');
      if (parts.length === 2) {
        label.textContent = parts[0];
        const sub = document.createElement('span');
        sub.className = 'sub';
        sub.textContent = parts[1];
        label.appendChild(sub);
      } else {
        // Shrink font for longer labels
        const len = data.label.length;
        if (len > 5) label.style.fontSize = '11px';
        else if (len > 4) label.style.fontSize = '12px';
        label.textContent = data.label;
      }
      key.appendChild(label);

      key.addEventListener('mouseenter', e => showTip(e, data.hint));
      key.addEventListener('mouseleave', hideTip);
      key.addEventListener('mousemove',  moveTip);

      if (data.layer != null) {
        key.addEventListener('mousedown', () => {
          holdLayer = data.layer;
          current = holdLayer;
          buildTabs();
          renderLayer(current);
        });
      }
    }

    placer.appendChild(key);
    container.appendChild(placer);
  });
}

// ─── Tooltip ─────────────────────────────────────────────────────────────────
function showTip(e, text) {
  tip.innerHTML = text.split('\n').map(l => `<div>${l}</div>`).join('');
  tip.style.display = 'block';
  moveTip(e);
}
function moveTip(e) {
  const x = Math.min(e.clientX + 16, window.innerWidth - 280);
  const y = e.clientY - 52;
  tip.style.left = x + 'px';
  tip.style.top  = y + 'px';
}
function hideTip() { tip.style.display = 'none'; }

// ─── Tabs ─────────────────────────────────────────────────────────────────────
const tabsEl = document.getElementById('tabs');
function buildTabs() {
  tabsEl.innerHTML = '';
  LAYERS.forEach((l, i) => {
    const t = document.createElement('button');
    t.className = 'layer-tab' + (i === current ? ' active' : '');
    t.textContent = l.name;
    t.onclick = () => { current = i; buildTabs(); renderLayer(i); };
    tabsEl.appendChild(t);
  });
}

buildTabs();
renderLayer(0);

// ─── Keyboard → Corne index map ─────────────────────────────────────────────
const CODE_TO_IDX = {
  // Row 1
  'Tab':0, 'KeyQ':1, 'KeyW':2, 'KeyE':3, 'KeyR':4, 'KeyT':5,
  'KeyY':6, 'KeyU':7, 'KeyI':8, 'KeyO':9, 'KeyP':10, 'Backspace':11,
  // Row 2
  'CapsLock':12, 'KeyA':13, 'KeyS':14, 'KeyD':15, 'KeyF':16, 'KeyG':17,
  'KeyH':18, 'KeyJ':19, 'KeyK':20, 'KeyL':21, 'Semicolon':22, 'Quote':23,
  // Row 3
  'ShiftLeft':24, 'KeyZ':25, 'KeyX':26, 'KeyC':27, 'KeyV':28, 'KeyB':29,
  'KeyN':30, 'KeyM':31, 'Comma':32, 'Period':33, 'Slash':34, 'ShiftRight':35,
  // Thumb keys (left: Alt, Cmd, Enter | right: Space, L1, L2)
  'AltLeft':36, 'MetaLeft':37, 'Enter':38,
  'Space':39, 'AltRight':40, 'ControlRight':41,
};

const heldKeys = new Set();

function getKeyEl(idx) {
  return container.querySelector(`[data-idx="${idx}"]`);
}

document.addEventListener('keydown', e => {
  // On Linux, AltRight can report as various codes; normalise
  const code = e.code === 'AltGraph' ? 'AltRight' : e.code;
  const idx = CODE_TO_IDX[code];
  if (idx == null || heldKeys.has(code)) return;
  heldKeys.add(code);
  e.preventDefault();

  // Always check BASE layer for layer-switch keys (physical position stays the same)
  const baseData = LAYERS[0].keys[idx];
  if (baseData && baseData.layer != null) {
    holdLayer = baseData.layer;
    current = holdLayer;
    buildTabs();
    renderLayer(current);
  } else {
    const el = getKeyEl(idx);
    if (el && !el.classList.contains('empty')) el.classList.add('pressed');
  }
});

document.addEventListener('keyup', e => {
  const code = e.code === 'AltGraph' ? 'AltRight' : e.code;
  const idx = CODE_TO_IDX[code];
  if (idx == null || !heldKeys.has(code)) return;
  heldKeys.delete(code);

  if (holdLayer != null && heldKeys.size === 0) {
    holdLayer = null;
    current = 0;
    buildTabs();
    renderLayer(0);
  } else {
    const el = getKeyEl(idx);
    if (el) el.classList.remove('pressed');
  }
});

window.addEventListener('blur', () => {
  heldKeys.clear();
  if (holdLayer != null) {
    holdLayer = null;
    current = 0;
    buildTabs();
    renderLayer(0);
  }
});
</script>
</body>
